<!--
  ══════════════════════════════════════════════════════
  SLIDER REBUILD SNIPPET
  — IntersectionObserver per card (no eager iframe load)
  — Load More as last slide inside slider
  — Smart dots (max 5 visible, no 100 dot madness 😂)
  ══════════════════════════════════════════════════════
  Replace your existing buildSliderBlock(), buildCardHTML(),
  wireSlider() with these. Everything else stays same.
  ══════════════════════════════════════════════════════
-->

<script>
/* ── per-slider state ── */
const sliderState = {};
const CARDS_PER_PAGE = 6;

/* ════════════════════════════════════════════
   BUILD SLIDER BLOCK
   (replaces your existing buildSliderBlock)
════════════════════════════════════════════ */
function buildSliderBlock(cat, index) {
  const block = document.createElement('div');
  block.className = 'slider-block';
  block.id = `block-${cat.id}`;

  block.innerHTML = `
    <div class="container">
      <div class="slider-header">
        <div class="slider-header-left">
          <div class="slider-cat-tag">${cat.icon} ${cat.label}</div>
          <div class="slider-title">${cat.title}</div>
          <div class="slider-desc">${cat.description}</div>
        </div>
        <div class="slider-nav-btns">
          <button class="slider-nav-btn" id="prev-${cat.id}" aria-label="Previous">‹</button>
          <button class="slider-nav-btn" id="next-${cat.id}" aria-label="Next">›</button>
        </div>
      </div>

      <div class="slider-track-wrap">
        <div class="slider-track" id="track-${cat.id}"></div>
      </div>

      <div class="slider-dots" id="dots-${cat.id}"></div>
    </div>
  `;

  return block;
}

/* ════════════════════════════════════════════
   BUILD ONE EMBED CARD
   — placeholder only, iframe via IntersectionObserver
════════════════════════════════════════════ */
const typeLabels = {
  reel:   '🎬 Reel',
  post:   '🖼️ Post',
  square: '🎬 Reel',
  video:  '🎥 Video'
};

function buildEmbedCard(item, catId, cardIdx) {
  const card = document.createElement('div');
  card.className = 'embed-card';
  card.id = `card-${catId}-${cardIdx}`;
  card.dataset.loaded = 'false';

  card.innerHTML = `
    <div class="embed-frame-wrap ${item.type}" id="fw-${catId}-${cardIdx}">
      <div class="embed-placeholder" id="ph-${catId}-${cardIdx}">
        <div class="ph-icon">${typeLabels[item.type] || '🖼️'}</div>
        <div class="ph-spinner"></div>
      </div>
    </div>
    <div class="embed-card-info">
      <div class="embed-card-type">${typeLabels[item.type] || '🖼️ Post'}</div>
      <div class="embed-card-title">${item.title || ''}</div>
      <div class="embed-card-caption">${item.caption || ''}</div>
    </div>
  `;

  /* inject iframe only when card enters viewport */
  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting || card.dataset.loaded === 'true') return;

      card.dataset.loaded = 'true';

      const fw = document.getElementById(`fw-${catId}-${cardIdx}`);
      const ph = document.getElementById(`ph-${catId}-${cardIdx}`);

      const iframe = document.createElement('iframe');
      iframe.src       = item.url;
      iframe.width     = '320';
      iframe.height    = item.type === 'reel' ? '560' : '480';
      iframe.style.cssText = 'border:none;overflow:hidden;position:absolute;inset:0;width:100%;height:100%;display:block;';
      iframe.scrolling = 'no';
      iframe.frameBorder = '0';
      iframe.allowFullscreen = true;
      iframe.setAttribute('allow', 'autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share');
      iframe.onload  = () => { if (ph) ph.style.display = 'none'; };
      iframe.onerror = () => {
        if (ph) ph.innerHTML = `
          <div class="ph-icon">⚠️</div>
          <span style="font-size:.75rem;color:var(--muted);padding:0 12px;text-align:center;">
            Could not load embed
          </span>`;
      };

      if (fw) fw.appendChild(iframe);
      obs.unobserve(entry.target);
    });
  }, { threshold: 0.15 });

  observer.observe(card);
  return card;
}

/* ════════════════════════════════════════════
   BUILD LOAD MORE CARD
   — last slide inside slider
════════════════════════════════════════════ */
function buildLoadMoreCard(catId) {
  const card = document.createElement('div');
  card.className = 'embed-card load-more-card';
  card.id = `loadmore-${catId}`;

  card.innerHTML = `
    <div class="lm-inner">
      <div class="lm-icon">▶</div>
      <div class="lm-text">Load More</div>
      <div class="lm-sub">Click to load next 6</div>
    </div>
  `;

  card.addEventListener('click', () => loadMore(catId));
  return card;
}

/* ════════════════════════════════════════════
   LOAD MORE — inject next 6 cards before
   the load more card, update dots
════════════════════════════════════════════ */
function loadMore(catId) {
  const state = sliderState[catId];
  if (!state) return;

  const { track, allItems } = state;
  const nextStart = state.loadedCount;
  const nextEnd   = Math.min(nextStart + CARDS_PER_PAGE, allItems.length);

  if (nextStart >= allItems.length) return;

  /* find load more card to insert before it */
  const lmCard = document.getElementById(`loadmore-${catId}`);

  for (let i = nextStart; i < nextEnd; i++) {
    const card = buildEmbedCard(allItems[i], catId, i);
    track.insertBefore(card, lmCard);
  }

  state.loadedCount = nextEnd;
  state.totalCards  = track.querySelectorAll('.embed-card:not(.load-more-card)').length;

  /* hide load more card if no more items */
  if (state.loadedCount >= allItems.length) {
    lmCard.style.display = 'none';
  }

  /* rebuild smart dots */
  buildSmartDots(catId);

  /* scroll to first new card */
  const newCard = document.getElementById(`card-${catId}-${nextStart}`);
  if (newCard) {
    track.scrollTo({
      left: newCard.offsetLeft - track.offsetLeft,
      behavior: 'smooth'
    });
  }
}

/* ════════════════════════════════════════════
   SMART DOTS — max 5 visible
   pattern: 1 • 2 • 3 • ... • last
════════════════════════════════════════════ */
function buildSmartDots(catId) {
  const state   = sliderState[catId];
  const dotsEl  = document.getElementById(`dots-${catId}`);
  if (!state || !dotsEl) return;

  /* total slides = loaded cards + load more card (if visible) */
  const lmCard    = document.getElementById(`loadmore-${catId}`);
  const hasMore   = lmCard && lmCard.style.display !== 'none';
  const totalDots = state.totalCards + (hasMore ? 1 : 0);
  const cur       = state.currentDot || 0;

  dotsEl.innerHTML = '';

  if (totalDots <= 1) return;

  /* which dot indices to render */
  const MAX_VISIBLE = 5;
  let indices = [];

  if (totalDots <= MAX_VISIBLE) {
    /* show all */
    indices = Array.from({ length: totalDots }, (_, i) => i);
  } else {
    /* always show first, last, current, and neighbors */
    const set = new Set([0, totalDots - 1, cur]);
    if (cur > 0) set.add(cur - 1);
    if (cur < totalDots - 1) set.add(cur + 1);

    /* fill up to MAX_VISIBLE */
    let idx = 1;
    while (set.size < MAX_VISIBLE && idx < totalDots - 1) {
      set.add(idx++);
    }

    indices = Array.from(set).sort((a, b) => a - b);
  }

  /* render dots with ellipsis gaps */
  indices.forEach((dotIdx, pos) => {
    /* ellipsis before this dot? */
    if (pos > 0 && dotIdx - indices[pos - 1] > 1) {
      const ellipsis = document.createElement('span');
      ellipsis.className = 'slider-dot-ellipsis';
      ellipsis.textContent = '…';
      dotsEl.appendChild(ellipsis);
    }

    const dot = document.createElement('button');
    dot.className = 'slider-dot' + (dotIdx === cur ? ' active' : '');
    dot.setAttribute('aria-label', `Go to slide ${dotIdx + 1}`);
    dot.addEventListener('click', () => scrollToDotIdx(catId, dotIdx));
    dotsEl.appendChild(dot);
  });
}

/* scroll track to a given dot index */
function scrollToDotIdx(catId, dotIdx) {
  const state = sliderState[catId];
  if (!state) return;

  const cards = state.track.querySelectorAll('.embed-card');
  const target = cards[dotIdx];
  if (!target) return;

  state.currentDot = dotIdx;
  state.track.scrollTo({
    left: target.offsetLeft - state.track.offsetLeft,
    behavior: 'smooth'
  });
  buildSmartDots(catId);
  updateNavBtns(catId);
}

/* ════════════════════════════════════════════
   WIRE SLIDER
   (replaces your existing wireSlider)
════════════════════════════════════════════ */
function wireSlider(cat) {
  const track   = document.getElementById(`track-${cat.id}`);
  const prevBtn = document.getElementById(`prev-${cat.id}`);
  const nextBtn = document.getElementById(`next-${cat.id}`);
  if (!track) return;

  /* init state */
  sliderState[cat.id] = {
    track,
    allItems:    cat.items || [],
    loadedCount: 0,
    totalCards:  0,
    currentDot:  0
  };

  const state = sliderState[cat.id];

  /* load first batch */
  const firstBatch = state.allItems.slice(0, CARDS_PER_PAGE);
  firstBatch.forEach((item, i) => track.appendChild(buildEmbedCard(item, cat.id, i)));
  state.loadedCount = firstBatch.length;
  state.totalCards  = firstBatch.length;

  /* load more card — only if more items exist */
  if (state.allItems.length > CARDS_PER_PAGE) {
    track.appendChild(buildLoadMoreCard(cat.id));
  }

  /* initial dots */
  buildSmartDots(cat.id);

  /* prev / next buttons */
  prevBtn.addEventListener('click', () => slideByOne(cat.id, -1));
  nextBtn.addEventListener('click', () => slideByOne(cat.id, +1));
  prevBtn.disabled = true;

  /* update dot + buttons on scroll */
  track.addEventListener('scroll', () => {
    const cardWidth = getCardWidth();
    const idx = Math.round(track.scrollLeft / cardWidth);

    if (idx !== state.currentDot) {
      state.currentDot = idx;
      buildSmartDots(cat.id);
      updateNavBtns(cat.id);
    }
  }, { passive: true });

  /* touch swipe */
  let touchStartX = 0;
  track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend', e => {
    const dx = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 50) slideByOne(cat.id, dx > 0 ? 1 : -1);
  }, { passive: true });
}

function slideByOne(catId, dir) {
  const state = sliderState[catId];
  if (!state) return;
  const cards = state.track.querySelectorAll('.embed-card');
  const newIdx = Math.max(0, Math.min(cards.length - 1, state.currentDot + dir));
  scrollToDotIdx(catId, newIdx);
}

function updateNavBtns(catId) {
  const state   = sliderState[catId];
  const prevBtn = document.getElementById(`prev-${catId}`);
  const nextBtn = document.getElementById(`next-${catId}`);
  if (!state || !prevBtn || !nextBtn) return;
  prevBtn.disabled = state.track.scrollLeft <= 4;
  nextBtn.disabled = state.track.scrollLeft + state.track.clientWidth >= state.track.scrollWidth - 4;
}

function getCardWidth() {
  const w = window.innerWidth;
  if (w <= 480)  return w * 0.82 + 18;
  if (w <= 768)  return 278;
  if (w <= 1024) return 308;
  return 338;
}

</script>
